    SyncRequest:
      type: object
      required: [operations]
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/SyncOperation"
    SyncOperation:
      type: object
      properties:
        op_id:
          type: string
          description: Client-generated operation identifier echoed in the response.
        resource_type:
          type: string
          enum: [food_entries, symptoms, energy_logs, sleep_logs, water_intakes, supplements]
        type:
          type: string
          description: Alias for resource_type.
        action:
          type: string
          enum: [upsert, delete]
          default: upsert
        id:
          type: integer
          description: Existing server record ID.
        client_uuid:
          type: string
          description: Client-generated stable UUID used for offline retry deduplication.
        attributes:
          type: object
          additionalProperties: true
    SyncResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SyncResult"
        meta:
          type: object
          required: [total, upserted, deleted, skipped, failed]
          properties:
            total:
              type: integer
            upserted:
              type: integer
              description: Number of operations that created or updated a record.
            deleted:
              type: integer
              description: Number of operations that deleted a record.
            skipped:
              type: integer
            failed:
              type: integer
    SyncResult:
      type: object
      required: [index, status]
      properties:
        op_id:
          type: [string, "null"]
        index:
          type: integer
        id:
          type: [integer, "null"]
        resource_type:
          type: [string, "null"]
        client_uuid:
          type: [string, "null"]
        status:
          type: string
          enum: [synced, deleted, skipped, failed]
        record:
          oneOf:
            - $ref: "#/components/schemas/FoodEntry"
            - $ref: "#/components/schemas/Symptom"
            - $ref: "#/components/schemas/EnergyLog"
            - $ref: "#/components/schemas/SleepLog"
            - $ref: "#/components/schemas/WaterIntake"
            - $ref: "#/components/schemas/Supplement"
            - type: "null"
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string

