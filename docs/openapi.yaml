openapi: 3.1.0
info:
  title: NaturoPath API
  version: v1
  description: REST API for practitioner-led health tracking, client mobile logging, invites, consent, sync, and GDPR flows.
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production placeholder
security:
  - bearerAuth: []
tags:
  - name: Practitioner Auth
  - name: Client Auth
  - name: Practitioner Clients
  - name: Practitioner Health Records
  - name: Practitioner Schedule
  - name: Client Profile
  - name: Client Health Records
  - name: Client Consents
  - name: Client Sync
  - name: GDPR
paths:
  /api/v1/practitioner/login:
    post:
      tags: [Practitioner Auth]
      summary: Log in a practitioner
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Practitioner authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PractitionerAuthResponse"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/client/login:
    post:
      tags: [Client Auth]
      summary: Log in a client
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Client authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/client/accept_invite:
    post:
      tags: [Client Auth]
      summary: Accept a client invite and set the initial password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_token, password]
              properties:
                invite_token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Invite accepted and client authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "404":
          description: Invalid invite token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "410":
          description: Invite expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/client/forgot_password:
    post:
      tags: [Client Auth]
      summary: Request a client password reset email
      description: Always returns 204 so callers cannot enumerate registered client emails.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Password reset request accepted if the account exists
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/client/reset_password:
    post:
      tags: [Client Auth]
      summary: Reset a client password using a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reset_token, password]
              properties:
                reset_token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset and client authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "401":
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/client/refresh:
    post:
      tags: [Client Auth]
      summary: Rotate a refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New access and refresh tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/client/logout:
    post:
      tags: [Client Auth]
      summary: Revoke a client refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "204":
          description: Refresh token revoked if it exists

  /api/v1/clients:
    get:
      tags: [Practitioner Clients]
      summary: List clients for the authenticated practitioner
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidPagination"
    post:
      tags: [Practitioner Clients]
      summary: Create a pending client invite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientWriteRequest"
      responses:
        "201":
          description: Client invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWithInviteEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/clients/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Practitioner Clients]
      summary: Show an owned client
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Practitioner Clients]
      summary: Update an owned client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientWriteRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Practitioner Clients]
      summary: Delete an owned client
      responses:
        "204":
          description: Client deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{id}/resend_invite:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      tags: [Practitioner Clients]
      summary: Rotate and resend a pending client invite
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWithInviteEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Invite has already been accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/clients/summary:
    get:
      tags: [Practitioner Clients]
      summary: Return a dashboard-oriented summary for all owned clients
      parameters:
        - name: tz
          in: query
          required: false
          description: IANA timezone used for day-boundary calculations. Falls back to UTC when unrecognised.
          schema:
            type: string
            example: Australia/Sydney
      responses:
        "200":
          description: Unpaginated roster summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientsSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/appointments:
    get:
      tags: [Practitioner Schedule]
      summary: List appointments across all clients for the authenticated practitioner
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [scheduled, completed, cancelled, no_show]
      responses:
        "200":
          description: Paginated schedule view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleAppointmentCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidScheduleQuery"

  /api/v1/appointments/upcoming:
    get:
      tags: [Practitioner Schedule]
      summary: Return the next scheduled appointments across all owned clients
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Upcoming appointments ordered by soonest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleAppointmentListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidParameter"

  /api/v1/client/profile:
    get:
      tags: [Client Profile]
      summary: Show the authenticated client's profile
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Client Profile]
      summary: Update the authenticated client's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProfileUpdateRequest"
      responses:
        "200":
          description: Client profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfileEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/password:
    patch:
      tags: [Client Profile]
      summary: Change the authenticated client's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed and new tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "401":
          description: Unauthorized or invalid current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/consents:
    get:
      tags: [Client Consents]
      summary: List consents for the authenticated client
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated consent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidPagination"
    post:
      tags: [Client Consents]
      summary: Create a consent record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consent_type, version]
              properties:
                consent_type:
                  type: string
                version:
                  type: string
      responses:
        "201":
          description: Consent recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/sync:
    post:
      tags: [Client Sync]
      summary: Sync queued client health-record operations
      description: Processes a batch of upsert/delete operations and returns per-operation results. Individual invalid operations fail without rejecting the entire batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Malformed sync payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/gdpr/export:
    post:
      tags: [GDPR]
      summary: Export all personal data for the authenticated client
      responses:
        "200":
          description: GDPR data export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdprExportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/gdpr/delete:
    delete:
      tags: [GDPR]
      summary: Delete all health data for the authenticated client
      responses:
        "200":
          description: Health data deleted and erasure consent retained
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Health data deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/client/food_entries:
    get:
      tags: [Client Health Records]
      summary: List the authenticated client's food entries
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Paginated food entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodEntryCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidListQuery"
    post:
      tags: [Client Health Records]
      summary: Create a food entry
      requestBody:
        $ref: "#/components/requestBodies/FoodEntry"
      responses:
        "201":
          $ref: "#/components/responses/FoodEntryCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/food_entries/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Client Health Records]
      summary: Show a food entry
      responses:
        "200":
          $ref: "#/components/responses/FoodEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Client Health Records]
      summary: Update a food entry
      requestBody:
        $ref: "#/components/requestBodies/FoodEntry"
      responses:
        "200":
          $ref: "#/components/responses/FoodEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Client Health Records]
      summary: Delete a food entry
      responses:
        "204":
          description: Food entry deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/client/symptoms:
    get:
      tags: [Client Health Records]
      summary: List the authenticated client's symptoms
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Paginated symptoms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymptomCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidListQuery"
    post:
      tags: [Client Health Records]
      summary: Create a symptom
      requestBody:
        $ref: "#/components/requestBodies/Symptom"
      responses:
        "201":
          $ref: "#/components/responses/SymptomCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/symptoms/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Client Health Records]
      summary: Show a symptom
      responses:
        "200":
          $ref: "#/components/responses/Symptom"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Client Health Records]
      summary: Update a symptom
      requestBody:
        $ref: "#/components/requestBodies/Symptom"
      responses:
        "200":
          $ref: "#/components/responses/Symptom"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Client Health Records]
      summary: Delete a symptom
      responses:
        "204":
          description: Symptom deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/client/energy_logs:
    get:
      tags: [Client Health Records]
      summary: List the authenticated client's energy logs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Paginated energy logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyLogCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidListQuery"
    post:
      tags: [Client Health Records]
      summary: Create an energy log
      requestBody:
        $ref: "#/components/requestBodies/EnergyLog"
      responses:
        "201":
          $ref: "#/components/responses/EnergyLogCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/energy_logs/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Client Health Records]
      summary: Show an energy log
      responses:
        "200":
          $ref: "#/components/responses/EnergyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Client Health Records]
      summary: Update an energy log
      requestBody:
        $ref: "#/components/requestBodies/EnergyLog"
      responses:
        "200":
          $ref: "#/components/responses/EnergyLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Client Health Records]
      summary: Delete an energy log
      responses:
        "204":
          description: Energy log deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/client/sleep_logs:
    get:
      tags: [Client Health Records]
      summary: List the authenticated client's sleep logs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Paginated sleep logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepLogCollectionEnvelope"
        "401":
