components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    From:
      name: from
      in: query
      required: false
      description: Start of date range. Date-only values use start of day in the app time zone.
      schema:
        type: string
        examples: ["2026-04-01", "2026-04-01T10:00:00Z"]
    To:
      name: to
      in: query
      required: false
      description: End of date range. Date-only values use end of day in the app time zone.
      schema:
        type: string
        examples: ["2026-04-07", "2026-04-07T23:59:59Z"]

  requestBodies:
    FoodEntry:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FoodEntryWriteRequest"
    Symptom:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SymptomWriteRequest"
    EnergyLog:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnergyLogWriteRequest"
    SleepLog:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SleepLogWriteRequest"
    WaterIntake:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WaterIntakeWriteRequest"
    Supplement:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SupplementWriteRequest"

  responses:
    Unauthorized:
      description: Missing, malformed, expired, or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidCredentials:
      description: Invalid email or password
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidPagination:
      description: Invalid pagination parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidParameter:
      description: Invalid query parameter or unsupported value
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidScheduleQuery:
      description: Invalid schedule query parameter such as an unsupported status or invalid date filter
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidListQuery:
      description: Invalid date filter or pagination parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found or not accessible to the authenticated user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    FoodEntry:
      description: Food entry
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FoodEntryEnvelope"
    FoodEntryCreated:
      description: Food entry created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FoodEntryEnvelope"
    Symptom:
      description: Symptom
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SymptomEnvelope"
    SymptomCreated:
      description: Symptom created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SymptomEnvelope"
    EnergyLog:
      description: Energy log
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnergyLogEnvelope"
    EnergyLogCreated:
      description: Energy log created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnergyLogEnvelope"
    SleepLog:
      description: Sleep log
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SleepLogEnvelope"
    SleepLogCreated:
      description: Sleep log created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SleepLogEnvelope"
    WaterIntake:
      description: Water intake
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WaterIntakeEnvelope"
    WaterIntakeCreated:
      description: Water intake created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WaterIntakeEnvelope"
    Supplement:
      description: Supplement
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SupplementEnvelope"
    SupplementCreated:
      description: Supplement created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SupplementEnvelope"

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PractitionerAuthResponse:
      type: object
      required: [token, practitioner]
      properties:
        token:
          type: string
          description: JWT access token. Currently expires after 24 hours.
        practitioner:
          $ref: "#/components/schemas/Practitioner"

    ClientAuthResponse:
      type: object
      required: [token, refresh_token, client]
      properties:
        token:
          type: string
          description: JWT access token. Currently expires after 24 hours.
        refresh_token:
          type: string
          description: Long-lived refresh token. Currently expires after 30 days and rotates on refresh.
        client:
          $ref: "#/components/schemas/Client"

    Practitioner:
      type: object
      required: [id, email, first_name, last_name]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        practice_name:
          type: [string, "null"]

    Client:
      type: object
      required: [id, email, first_name, last_name, practitioner_id, invite_accepted, focus_tag, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: [string, "null"]
          format: date
        practitioner_id:
          type: integer
        invite_accepted:
          type: boolean
        focus_tag:
          type: [string, "null"]
          maxLength: 80
        invite_expires_at:
          type: string
          format: date-time
          description: Present only for pending invites.
        created_at:
          type: string
          format: date-time

    ClientWithInviteToken:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          required: [invite_token]
          properties:
            invite_token:
              type: string

    ClientProfile:
      type: object
      required: [id, email, first_name, last_name, practitioner]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: [string, "null"]
          format: date
        practitioner:
          type: object
          required: [id, first_name, last_name]
          properties:
            id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
            practice_name:
              type: [string, "null"]

    ClientWriteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        focus_tag:
          type: [string, "null"]
          maxLength: 80

    ClientProfileUpdateRequest:
      $ref: "#/components/schemas/ClientWriteRequest"

    PaginationMeta:
      type: object
      required: [page, per_page, total_count, total_pages]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              examples:
                - unauthorized
                - invalid_credentials
                - validation_failed
                - invalid_date_filter
                - invalid_pagination
                - invalid_parameter
                - invalid_refresh_token
                - invalid_reset_token
                - invalid_sync_payload
            message:
              type: string
            request_id:
              type: string
            details:
              type: array
              items:
                type: string
            meta:
              type: object
              additionalProperties: true

    FoodEntry:
      type: object
      required: [id, client_id, consumed_at, created_at, updated_at]
      properties:
        id:
          type: integer
        client_id:
          type: integer
        client_uuid:
          type: [string, "null"]
        meal_type:
          type: [string, "null"]
          enum: [breakfast, lunch, dinner, snack, null]
        description:
          type: [string, "null"]
        consumed_at:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FoodEntryWriteRequest:
      type: object
      properties:
        meal_type:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        description:
          type: string
        consumed_at:
          type: string
          format: date-time
        notes:
          type: string

    Symptom:
      type: object
      required: [id, client_id, name, occurred_at, created_at, updated_at]
      properties:
        id:
          type: integer
        client_id:
          type: integer
        client_uuid:
          type: [string, "null"]
        name:
          type: string
        severity:
          type: [integer, "null"]
          minimum: 1
          maximum: 10
        occurred_at:
          type: string
          format: date-time
        duration_minutes:
          type: [integer, "null"]
        notes:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SymptomWriteRequest:
      type: object
      properties:
        name:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 10
        occurred_at:
          type: string
          format: date-time
        duration_minutes:
