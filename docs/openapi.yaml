        "422":
          $ref: "#/components/responses/InvalidListQuery"
    post:
      tags: [Client Health Records]
      summary: Create a sleep log
      requestBody:
        $ref: "#/components/requestBodies/SleepLog"
      responses:
        "201":
          $ref: "#/components/responses/SleepLogCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/sleep_logs/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Client Health Records]
      summary: Show a sleep log
      responses:
        "200":
          $ref: "#/components/responses/SleepLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Client Health Records]
      summary: Update a sleep log
      requestBody:
        $ref: "#/components/requestBodies/SleepLog"
      responses:
        "200":
          $ref: "#/components/responses/SleepLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Client Health Records]
      summary: Delete a sleep log
      responses:
        "204":
          description: Sleep log deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/client/water_intakes:
    get:
      tags: [Client Health Records]
      summary: List the authenticated client's water intakes
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Paginated water intakes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterIntakeCollectionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/InvalidListQuery"
    post:
      tags: [Client Health Records]
      summary: Create a water intake
      requestBody:
        $ref: "#/components/requestBodies/WaterIntake"
      responses:
        "201":
          $ref: "#/components/responses/WaterIntakeCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/v1/client/water_intakes/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Client Health Records]
      summary: Show a water intake
      responses:
        "200":
          $ref: "#/components/responses/WaterIntake"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Client Health Records]
      summary: Update a water intake
      requestBody:
        $ref: "#/components/requestBodies/WaterIntake"
      responses:
        "200":
          $ref: "#/components/responses/WaterIntake"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
